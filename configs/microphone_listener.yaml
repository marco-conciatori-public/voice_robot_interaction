verbose: 0

# The microphone now physically lives on the RDK X3 main board. This component receives the processed audio +
# VAD over the wired link; the connection settings are in mic_stream_client.yaml. The audio identification
# numbers and device index are no longer needed here (the RDK X3 owns the device).

# if a voice was detected and a recording started, if no voice is detected for this duration, the recording
# will stop (in seconds)
max_silence_duration: 2
# recordings shorter than this duration (seconds) will be discarded
min_sentence_duration: 1

# whether to save audio files recorded by the microphone listener
save_file: False

# format of the received PCM, used to package the in-memory WAV sent to the reasoning API. These MUST match
# what the RDK X3 sends (see audio_bridge_server.yaml: mic_sample_rate, mic_format = 16 kHz mono 16-bit).
stream_params:
  # audio sample rate in Hz
  sample_rate: 16000
  # number of channels
  channels: 1
  # width of each sample in bytes
  width: 2

# parameters for the RGB LED light on the expansion board
led_intensity: 120 # 0-255
